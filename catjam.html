<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Jam - Forever</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #0a0e27;
            font-family: 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridShift 20s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes gridShift {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
        }

        .video-wrapper {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 
                0 0 60px rgba(99, 102, 241, 0.4),
                0 0 120px rgba(99, 102, 241, 0.2),
                inset 0 0 40px rgba(99, 102, 241, 0.1);
            animation: pulse 4s ease-in-out infinite;
            border: 2px solid rgba(99, 102, 241, 0.2);
        }

        @keyframes pulse {
            0%, 100% { 
                box-shadow: 
                    0 0 60px rgba(99, 102, 241, 0.4),
                    0 0 120px rgba(99, 102, 241, 0.2),
                    inset 0 0 40px rgba(99, 102, 241, 0.1);
            }
            50% { 
                box-shadow: 
                    0 0 80px rgba(99, 102, 241, 0.6),
                    0 0 160px rgba(99, 102, 241, 0.3),
                    inset 0 0 60px rgba(99, 102, 241, 0.15);
            }
        }

        video {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            background: #000;
        }

        /* Status indicator */
        .status {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 3;
            font-size: 12px;
            color: rgba(99, 102, 241, 0.6);
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Keyboard hint */
        .hint {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 3;
            font-size: 11px;
            color: rgba(99, 102, 241, 0.4);
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .hint {
                font-size: 9px;
            }
            
            .status {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-wrapper">
            <video 
                autoplay 
                loop 
                muted 
                playsinline
                id="catjam"
            >
                <source src="data:video/mp4;base64,">
            </video>
        </div>
    </div>

    <div class="status">
        <span>cat jam active</span>
    </div>

    <div class="hint">SPACE • MUTE</div>

    <script>
        const video = document.getElementById('catjam');
        
        // Handle play/pause with spacebar
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            }
            
            // Toggle mute with M
            if (e.code === 'KeyM') {
                video.muted = !video.muted;
            }
        });

        // Ensure video loops seamlessly
        video.addEventListener('ended', () => {
            video.currentTime = 0;
            video.play();
        });
    </script>
</body>
</html>
